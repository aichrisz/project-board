<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/project-board/favicon.svg" />
    <link rel="apple-touch-icon" href="/project-board/icon-192.png" />
    <link rel="manifest" href="/project-board/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project Board — personal project inventory dashboard" />
    <meta name="theme-color" content="#0f1218" />
    <meta name="color-scheme" content="dark light" />
    <title>Project Board</title>
    <!-- Apply theme before paint to reduce flash -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('project-board-v1');
          var mode = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.settings && parsed.settings.theme) {
              mode = parsed.settings.theme;
            }
          }
          var resolved = mode;
          if (mode === 'system') {
            resolved =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/project-board/assets/index-D9bhsYb0.js"></script>
    <link rel="stylesheet" crossorigin href="/project-board/assets/index-D7paZX_Y.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
